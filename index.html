<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>22IS444 Attendance</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#0a0a0f;
color:#e8e8f0;
text-align:center;
margin:0;
}

header{
background:#12121a;
padding:15px;
border-bottom:1px solid #2a2a3d;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1a1a26;
padding:20px;
border-radius:10px;
margin-top:20px;
border:1px solid #2a2a3d;
}

input,select{
padding:10px;
margin:10px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:12px 18px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

.green{background:#00aa66;color:white}
.red{background:#ff4466;color:white}
.blue{background:#0099cc;color:white}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #333;
padding:6px;
}

.success{
color:#00ff9d;
font-size:20px;
margin-top:10px;
}

.error{
color:#ff4466;
margin-top:10px;
}

.hidden{display:none}

</style>
</head>

<body>

<header>
<h2>KLS Gogte Institute of Technology</h2>
ISE Dept · Python Programming — 22IS444 · 2025-26
</header>

<div class="container">

<div id="login">

<div class="card">
<h3>Student</h3>
<button class="blue" onclick="showStudent()">Mark Attendance</button>
</div>

<div class="card hidden" id="profcard">
<h3>Professor</h3>
<button class="green" onclick="showProfessor()">Open Dashboard</button>
</div>

</div>

<div id="student" class="hidden">

<div class="card">

<h3>Student Attendance</h3>

<input id="usn" placeholder="Enter USN"><br>
<input id="token" placeholder="4 digit token"><br>

<button id="submitBtn" class="green" onclick="submitAttendance()">Submit</button>

<div id="result"></div>

<button onclick="goHome()">Back</button>

</div>

</div>

<div id="prof" class="hidden">

<div class="card">

<h3>Professor Dashboard</h3>

Date
<input type="date" id="date">

Period
<select id="period">
<option>P1</option>
<option>P2</option>
</select>

<br>

<button class="green" onclick="openSession()">Open Attendance</button>
<button class="red" onclick="closeSession()">Close Attendance</button>

<h3 id="sessionStatus">Closed</h3>

<div id="tokenDisplay"></div>

<div id="timer"></div>

</div>

<div class="card">

<h3>Live Attendance</h3>

<table id="table">

<tr>
<th>USN</th>
<th>Name</th>
<th>Time</th>
</tr>

</table>

</div>

<div class="card">

<button onclick="exportExcel()">Export Excel</button>

</div>

<button onclick="goHome()">Exit</button>

</div>

</div>

<script>

const BIN_ID="69b2559eb7ec241ddc605001";
const API_KEY="$2a$10$rhR8M3EZH2BrZf4icYP8n./3XIT9lDt1Ba4fG8zYjyvZOEb8racrq";

const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let timer=null;
let poll=null;

const STUDENTS=[
{usn:'2GI24IS040',name:'Naveen Kumar K'},
{usn:'2GI24IS043',name:'Nisarga Bairawadagi'},
{usn:'2GI24IS044',name:'Omkar Bhovi'},
{usn:'2GI24IS047',name:'Prajwal H'},
{usn:'2GI24IS048',name:'Prajwal Manoj'},
{usn:'2GI24IS049',name:'Pranav Panale'}
];

function findStudent(usn){
return STUDENTS.find(s=>s.usn===usn);
}

function apiGet(){
return fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}})
.then(r=>r.json()).then(d=>d.record);
}

function apiPut(data){
return fetch(BASE,{
method:'PUT',
headers:{
'Content-Type':'application/json',
'X-Master-Key':API_KEY
},
body:JSON.stringify(data)
});
}

function showStudent(){
hideAll();
student.style.display="block";
}

function showProfessor(){
hideAll();
prof.style.display="block";
}

function goHome(){
hideAll();
login.style.display="block";
}

function hideAll(){
login.style.display="none";
student.style.display="none";
prof.style.display="none";
}

function randomToken(){
return Math.floor(1000+Math.random()*9000);
}

async function openSession(){

let token=randomToken();

let data={
activeSession:{
token:token,
present:[],
times:{},
openedAt:new Date().toISOString()
}
};

await apiPut(data);

tokenDisplay.innerHTML="<h2>Token: "+token+"</h2>";

sessionStatus.innerText="OPEN";

startTimer();

startPolling();

}

async function closeSession(){

let data=await apiGet();

data.activeSession=null;

await apiPut(data);

clearInterval(timer);
clearInterval(poll);

sessionStatus.innerText="Closed";

}

function startTimer(){

let start=Date.now();

timer=setInterval(()=>{

let e=Math.floor((Date.now()-start)/1000);

let m=Math.floor(e/60);
let s=e%60;

timer.innerText="Elapsed "+m+":"+s;

if(e>=300)closeSession();

},1000);

}

function startPolling(){

poll=setInterval(loadTable,5000);

}

async function loadTable(){

let data=await apiGet();

if(!data.activeSession)return;

let t=document.getElementById("table");

t.innerHTML="<tr><th>USN</th><th>Name</th><th>Time</th></tr>";

for(let u of data.activeSession.present){

let time=data.activeSession.times[u];

let stu=findStudent(u);

let name=stu?stu.name:"";

t.innerHTML+="<tr><td>"+u+"</td><td>"+name+"</td><td>"+time+"</td></tr>";

}

}

async function submitAttendance(){

let usn=document.getElementById("usn").value.trim().toUpperCase();

let token=document.getElementById("token").value;

let res=document.getElementById("result");

let data=await apiGet();

if(!data.activeSession){

res.innerHTML="<div class='error'>Attendance Closed</div>";

return;

}

if(token!=data.activeSession.token){

res.innerHTML="<div class='error'>Incorrect Token</div>";

return;

}

let stu=findStudent(usn);

if(!stu){

res.innerHTML="<div class='error'>USN Not Found</div>";

return;

}

if(data.activeSession.present.includes(usn)){

res.innerHTML="<div class='error'>Already Marked</div>";

return;

}

let now=new Date();

let time=now.getHours()+":"+now.getMinutes();

data.activeSession.present.push(usn);

data.activeSession.times[usn]=time;

await apiPut(data);

res.innerHTML="<div class='success'>Attendance Marked<br>"+stu.name+"<br>"+usn+"</div>";

submitBtn.disabled=true;
submitBtn.innerText="Submitted";

}

function exportExcel(){

let rows=[["Sl","USN","Name"]];

STUDENTS.forEach((s,i)=>{

rows.push([i+1,s.usn,s.name]);

});

let ws=XLSX.utils.aoa_to_sheet(rows);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Attendance");

XLSX.writeFile(wb,"Attendance.xlsx");

}

document.addEventListener("DOMContentLoaded",()=>{

let p=new URLSearchParams(location.search);

if(p.get("prof")=="1")profcard.style.display="block";

});

</script>

</body>
</html>
