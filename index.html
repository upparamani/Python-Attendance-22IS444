<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>22IS444 Attendance</title>

<style>
body{
font-family:Arial;
background:#0a0a0f;
color:#e8e8f0;
text-align:center;
margin:0;
}

header{
background:#12121a;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1a1a26;
padding:20px;
border-radius:10px;
margin-top:20px;
}

button{
padding:12px 18px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

.green{background:#00aa66;color:white}
.blue{background:#0099cc;color:white}

.hidden{display:none}
</style>

</head>

<body>

<header>
<h2>KLS Gogte Institute of Technology</h2>
ISE Dept · Python Programming — 22IS444 · 2025-26
</header>

<div class="container">

<div id="home">

<div class="card">
<h3>Professor</h3>
<button class="green" onclick="showProfessor()">Open Dashboard</button>
</div>

<div class="card">
<h3>Student</h3>
<button class="blue" onclick="showStudent()">Mark Attendance</button>
</div>

</div>

<div id="prof" class="hidden">

<div class="card">
<h3>Professor Dashboard</h3>

<button onclick="generateToken()">Open Attendance</button>

<h2 id="tokenDisplay"></h2>

<button onclick="goHome()">Back</button>

</div>

</div>

<div id="student" class="hidden">

<div class="card">

<h3>Student Attendance</h3>

<input id="usn" placeholder="Enter USN"><br>
<input id="token" placeholder="Token"><br>

<button onclick="submitAttendance()">Submit</button>

<div id="result"></div>

<button onclick="goHome()">Back</button>

</div>

</div>

</div>

<script>

let currentToken=null;

function showProfessor(){
home.style.display="none";
prof.style.display="block";
}

function showStudent(){
home.style.display="none";
student.style.display="block";
}

function goHome(){
prof.style.display="none";
student.style.display="none";
home.style.display="block";
}

function generateToken(){
currentToken=Math.floor(1000+Math.random()*9000);
tokenDisplay.innerText="Token: "+currentToken;
}

function submitAttendance(){

let entered=document.getElementById("token").value;

if(entered==currentToken){

result.innerHTML="<span style='color:lightgreen'>Attendance Accepted</span>";

}else{

result.innerHTML="<span style='color:red'>Wrong Token</span>";

}

}

</script>

</body>
</html>
