<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22IS444 Attendance</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0a0a0f;
color:#e8e8f0;
margin:0;
padding:0;
text-align:center;
}

header{
padding:20px;
background:#12121a;
border-bottom:1px solid #2a2a3d;
}

h1{margin:5px}
h2{margin:5px;font-weight:normal;color:#aaa}

.container{
padding:20px;
max-width:800px;
margin:auto;
}

.card{
background:#1a1a26;
padding:20px;
border-radius:10px;
margin-top:20px;
border:1px solid #2a2a3d;
}

input,select{
padding:12px;
margin:10px;
font-size:16px;
width:220px;
border-radius:6px;
border:none;
}

button{
padding:12px 18px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

.green{background:#00aa66;color:white}
.red{background:#ff4466;color:white}
.blue{background:#0099cc;color:white}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #333;
padding:8px;
}

.success{
color:#00ff9d;
font-size:20px;
margin-top:20px;
}

.error{
color:#ff4466;
margin-top:20px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
<h1>KLS Gogte Institute of Technology</h1>
<h2>ISE Dept · Python Programming — 22IS444 · 2025-26</h2>
</header>

<div class="container">

<!-- LOGIN -->

<div id="login">

<div class="card">
<h2>Student</h2>
<button class="blue" onclick="showStudent()">Mark Attendance</button>
</div>

<div class="card hidden" id="profcard">
<h2>Professor</h2>
<button class="green" onclick="showProfessor()">Open Dashboard</button>
</div>

</div>

<!-- STUDENT SCREEN -->

<div id="student" class="hidden">

<div class="card">
<h2>Mark Attendance</h2>

<input id="usn" placeholder="Enter USN"><br>
<input id="token" placeholder="4 digit token"><br>

<button class="green" onclick="submitAttendance()">Submit</button>

<div id="studentResult"></div>

<button onclick="goHome()">Back</button>

</div>

</div>

<!-- PROFESSOR DASHBOARD -->

<div id="prof" class="hidden">

<div class="card">

<h2>Professor Dashboard</h2>

Date
<input type="date" id="date">

Period
<select id="period">
<option>P1</option>
<option>P2</option>
</select>

<br>

<button class="green" onclick="openSession()">Open Attendance</button>
<button class="red" onclick="closeSession()">Close Attendance</button>

<h3 id="sessionInfo">Session Closed</h3>

<div id="tokenDisplay"></div>

<h3 id="timer"></h3>

</div>

<div class="card">

<h3>Live Attendance</h3>

<table id="table">
<tr>
<th>USN</th>
<th>Time</th>
</tr>
</table>

</div>

<button onclick="goHome()">Exit</button>

</div>

</div>

<script>

const BIN_ID="69b2559eb7ec241ddc605001";
const API_KEY="$2a$10$rhR8M3EZH2BrZf4icYP8n./3XIT9lDt1Ba4fG8zYjyvZOEb8racrq";

const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let sessionTimer=null;
let pollTimer=null;
let sessionToken=null;
let openedAt=null;

function apiGet(){
return fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}})
.then(r=>r.json()).then(d=>d.record);
}

function apiPut(data){
return fetch(BASE,{
method:'PUT',
headers:{
'Content-Type':'application/json',
'X-Master-Key':API_KEY
},
body:JSON.stringify(data)
});
}

function showStudent(){
hideAll();
document.getElementById("student").style.display="block";
}

function showProfessor(){
hideAll();
document.getElementById("prof").style.display="block";
}

function goHome(){
hideAll();
document.getElementById("login").style.display="block";
}

function hideAll(){
document.getElementById("login").style.display="none";
document.getElementById("student").style.display="none";
document.getElementById("prof").style.display="none";
}

function randomToken(){
return Math.floor(1000+Math.random()*9000).toString();
}

async function openSession(){

let date=document.getElementById("date").value;
let period=document.getElementById("period").value;

sessionToken=randomToken();

openedAt=new Date().toISOString();

let data={
activeSession:{
token:sessionToken,
date:date,
period:period,
present:[],
times:{},
openedAt:openedAt
}
};

await apiPut(data);

document.getElementById("tokenDisplay").innerHTML=
"<h2>Token: "+sessionToken+"</h2>";

document.getElementById("sessionInfo").innerText="Attendance OPEN";

startTimer();
startPolling();

}

async function closeSession(){

let data=await apiGet();

data.activeSession=null;

await apiPut(data);

clearInterval(sessionTimer);
clearInterval(pollTimer);

document.getElementById("sessionInfo").innerText="Session Closed";

}

function startTimer(){

let start=Date.now();

sessionTimer=setInterval(()=>{

let elapsed=Math.floor((Date.now()-start)/1000);

let min=Math.floor(elapsed/60);
let sec=elapsed%60;

document.getElementById("timer").innerText=
"Elapsed: "+min+":"+sec;

if(elapsed>=300){
closeSession();
}

},1000);

}

function startPolling(){

pollTimer=setInterval(loadTable,5000);

}

async function loadTable(){

let data=await apiGet();

if(!data.activeSession)return;

let table=document.getElementById("table");

table.innerHTML="<tr><th>USN</th><th>Time</th></tr>";

for(let u of data.activeSession.present){

let t=data.activeSession.times[u];

let row="<tr><td>"+u+"</td><td>"+t+"</td></tr>";

table.innerHTML+=row;

}

}

async function submitAttendance(){

let usn=document.getElementById("usn").value.trim().toUpperCase();
let token=document.getElementById("token").value.trim();

let res=document.getElementById("studentResult");

let data=await apiGet();

if(!data.activeSession){
res.innerHTML="<div class='error'>Attendance Closed</div>";
return;
}

if(token!=data.activeSession.token){
res.innerHTML="<div class='error'>Incorrect Token</div>";
return;
}

if(data.activeSession.present.includes(usn)){
res.innerHTML="<div class='error'>Already Marked</div>";
return;
}

let now=new Date();

let time=now.getHours()+":"+now.getMinutes();

data.activeSession.present.push(usn);

data.activeSession.times[usn]=time;

await apiPut(data);

res.innerHTML="<div class='success'>Attendance Marked</div>";

}

document.addEventListener("DOMContentLoaded",()=>{

let params=new URLSearchParams(location.search);

if(params.get("prof")=="1"){
document.getElementById("profcard").style.display="block";
}

});

</script>

</body>
</html>
