<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attendance System V4.1</title>

<link rel="stylesheet" href="style.css">
<script src="students.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

</head>

<body>

<header>
<h2>KLS Gogte Institute of Technology</h2>
ISE Department · Python Programming · Attendance
</header>

<div class="container">

<div id="login">

<div class="card hidden" id="profcard">
<h2>Professor</h2>
<button class="green" onclick="showProfessor()">Open Professor Dashboard</button>
</div>

<div class="card">
<h3>Student</h3>
<button class="blue" onclick="showStudent()">Mark Attendance</button>
</div>

</div>

<!-- STUDENT -->
<div id="student" class="hidden">
<div class="card">

<h3>Student Attendance</h3>

<input id="usn" placeholder="Enter USN"
style="text-transform:uppercase" oninput="previewName()">

<div id="namePreview" style="color:#00e5ff;margin-bottom:10px"></div>

<input id="token" placeholder="4 digit token"><br>

<button id="submitBtn" class="green" onclick="submitAttendance()">Submit</button>

<div id="result"></div>

</div>
</div>

<!-- PROFESSOR -->
<div id="prof" class="hidden">

<div class="card">

<h3>Professor Dashboard</h3>

<!-- ✅ NEW DATE PICKER -->
Date:
<input type="date" id="datePicker">

<br>

<select id="period">
<option>P1</option>
<option>P2</option>
</select><br>

<button id="openBtn" class="green" onclick="openSession()">Open</button>
<button class="red" onclick="closeSession()">Close</button>
<button class="blue" onclick="pauseSession()">Pause</button>
<button class="green" onclick="resumeSession()">Resume</button>

<h2 id="status">Closed</h2>
<div class="token" id="tokenDisplay"></div>
<div id="timer"></div>
<div id="count"></div>

</div>

<div class="card">
<h3>Live Attendance</h3>
<table id="table">
<tr><th>USN</th><th>Name</th><th>Time</th></tr>
</table>
</div>

<div class="card">
<h3>Students Not Marked Yet</h3>
<table id="absentTable">
<tr><th>USN</th><th>Name</th></tr>
</table>
</div>

<div class="card">
<button onclick="exportExcel()">Export Excel</button>
</div>

<button onclick="goHome()">Exit</button>

</div>

</div>

<script>

const BIN_ID="69b2559eb7ec241ddc605001";
const API_KEY="$2a$10$rhR8M3EZH2BrZf4icYP8n./3XIT9lDt1Ba4fG8zYjyvZOEb8racrq";
const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let timerInterval;
let pollInterval;
let paused=false;

function findStudent(usn){
return STUDENTS.find(s=>s.id===usn);
}

async function apiGet(){
let r=await fetch(BASE+"/latest",{headers:{'X-Master-Key':API_KEY}});
let j=await r.json();
return j.record;
}

async function apiPut(data){
await fetch(BASE,{
method:'PUT',
headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
body:JSON.stringify(data)
});
}

function hideAll(){
login.style.display="none";
student.style.display="none";
prof.style.display="none";
}

function showStudent(){
hideAll();
student.style.display="block";
}

async function showProfessor(){
hideAll();
prof.style.display="block";

document.getElementById("datePicker").value =
new Date().toISOString().slice(0,10);

let data=await apiGet();

if(data && data.activeSession){
paused=data.activeSession.paused || false;
status.innerText=paused?"PAUSED":"OPEN";
tokenDisplay.innerText=data.activeSession.token;
startPolling();
}else{
status.innerText="Closed";
}
}

function goHome(){
hideAll();
login.style.display="block";
}

function previewName(){
let val=document.getElementById("usn").value.trim().toUpperCase();
let stu=findStudent(val);
namePreview.innerText=stu?stu.name:"";
}

function randomToken(){
return Math.floor(1000+Math.random()*9000);
}

async function openSession(){

let data=await apiGet();

if(data && data.activeSession){
alert("Already Open");
return;
}

let token=randomToken();

let selectedDate=document.getElementById("datePicker").value ||
new Date().toISOString().slice(0,10);

if(!data){
data={sessions:[],activeSession:null};
}

data.activeSession={
token:token,
date:selectedDate,
period:period.value,
present:[],
times:{},
paused:false
};

await apiPut(data);

paused=false;
tokenDisplay.innerText=token;
status.innerText="OPEN";
openBtn.disabled=true;

startTimer();
startPolling();
}

function startTimer(){

let remaining=300;

timerInterval=setInterval(()=>{

if(paused) return;

remaining--;

let m=Math.floor(remaining/60);
let s=remaining%60;
if(s<10)s="0"+s;

timer.innerText="Time Remaining "+m+":"+s;

if(remaining<=0)closeSession();

},1000);
}

function startPolling(){
pollInterval=setInterval(loadTable,2000);
}

async function pauseSession(){
paused=true;
let data=await apiGet();
data.activeSession.paused=true;
await apiPut(data);
status.innerText="PAUSED";
}

async function resumeSession(){
paused=false;
let data=await apiGet();
data.activeSession.paused=false;
await apiPut(data);
status.innerText="OPEN";
}

async function closeSession(){

let data=await apiGet();

if(data.activeSession){
data.sessions=data.sessions||[];
data.sessions.push(data.activeSession);
data.activeSession=null;
await apiPut(data);
}

clearInterval(timerInterval);
clearInterval(pollInterval);

status.innerText="Closed";
openBtn.disabled=false;
tokenDisplay.innerText="";
timer.innerText="";
count.innerText="";
}

async function loadTable(){

let data=await apiGet();
if(!data || !data.activeSession) return;

let sess=data.activeSession;

table.innerHTML="<tr><th>USN</th><th>Name</th><th>Time</th></tr>";
absentTable.innerHTML="<tr><th>USN</th><th>Name</th></tr>";

for(let u of sess.present){
let stu=findStudent(u);
let name=stu?stu.name:"";
let time=sess.times[u];
table.innerHTML+=`<tr><td>${u}</td><td>${name}</td><td>${time}</td></tr>`;
}

STUDENTS.forEach(s=>{
if(!sess.present.includes(s.id)){
absentTable.innerHTML+=`<tr><td>${s.id}</td><td>${s.name}</td></tr>`;
}
});

count.innerHTML="Present: "+sess.present.length+" / "+STUDENTS.length;
}

async function submitAttendance(){

let usnVal=document.getElementById("usn").value.trim().toUpperCase();
let tokenVal=document.getElementById("token").value;



let data=await apiGet();

if(!data.activeSession){
result.innerHTML="<div class='error'>Closed</div>";
return;
}

if(data.activeSession.paused){
result.innerHTML="<div class='error'>Paused</div>";
return;
}

if(tokenVal!=data.activeSession.token){
result.innerHTML="<div class='error'>Wrong Token</div>";
return;
}

let stu=findStudent(usnVal);

if(!stu){
result.innerHTML="<div class='error'>Invalid USN</div>";
return;
}

if(data.activeSession.present.includes(usnVal)){
result.innerHTML="<div class='error'>Already Marked</div>";
return;
}

let now=new Date();
let time=now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');

data.activeSession.present.push(usnVal);
data.activeSession.times[usnVal]=time;

await apiPut(data);

localStorage.setItem(key,"done");

result.innerHTML="<div class='success'>Marked<br>"+stu.name+"</div>";

submitBtn.disabled=true;

document.getElementById("usn").value="";
document.getElementById("token").value="";
namePreview.innerText="";
}

function exportExcel(){

apiGet().then(data=>{

let sessions=data.sessions||[];
let rows=[];

rows.push(["Attendance Register"]);
rows.push(["Generated: "+new Date().toLocaleString()]);
rows.push([]);

let header=["Sl","USN","Name","Total","%"];
sessions.forEach(s=>header.push(s.date+"-"+s.period));
rows.push(header);

STUDENTS.forEach((s,i)=>{

let total=0;
let row=[i+1,s.id,s.name,0,0];

sessions.forEach(sess=>{
if(sess.present.includes(s.id)){
row.push("P");
total++;
}else{
row.push("A");
}
});

row[3]=total;
row[4]=sessions.length?Math.round(total*100/sessions.length):0;

rows.push(row);

});

let ws=XLSX.utils.aoa_to_sheet(rows);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Attendance");
XLSX.writeFile(wb,"Attendance.xlsx");

});
}

document.addEventListener("DOMContentLoaded",()=>{
let p=new URLSearchParams(location.search);
if(p.get("prof")=="1")profcard.style.display="block";
});

</script>

</body>
</html>
