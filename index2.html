<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Attendance System V3</title>

<link rel="stylesheet" href="style.css">

<script src="students.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<header>
<h2>KLS Gogte Institute of Technology</h2>
ISE Department · Python Programming · Attendance
</header>

<div class="container">

<div id="login">

<div class="card hidden" id="profcard">

<h2>Professor</h2>

<button class="green"
style="font-size:20px;padding:18px 30px"
onclick="showProfessor()">

Open Professor Dashboard

</button>

</div>

<div class="card">

<h3>Student</h3>

<button class="blue" onclick="showStudent()">

Mark Attendance

</button>

</div>

</div>


<div id="student" class="hidden">

<div class="card">

<h3>Student Attendance</h3>

<input id="usn"
placeholder="Enter USN"
style="text-transform:uppercase"
oninput="previewName()">

<div id="namePreview"
style="color:#00e5ff;margin-bottom:10px"></div>

<input id="token"
placeholder="4 digit token">

<br>

<button id="submitBtn"
class="green"
onclick="submitAttendance()">

Submit

</button>

<div id="result"></div>

</div>

</div>


<div id="prof" class="hidden">

<div class="card">

<h3>Professor Dashboard</h3>

Period

<select id="period">
<option>P1</option>
<option>P2</option>
</select>

<br>

<button id="openBtn" class="green" onclick="openSession()">
Open Attendance
</button>

<button class="red" onclick="closeSession()">
Close Attendance
</button>

<button class="blue" onclick="pauseSession()">
Pause
</button>

<button class="green" onclick="resumeSession()">
Resume
</button>

<h3 id="status">Closed</h3>

<div class="token" id="tokenDisplay"></div>

<div id="timer"></div>

<div id="count"></div>

</div>

<div class="card">

<h3>Live Attendance</h3>

<table id="table">

<tr>
<th>USN</th>
<th>Name</th>
<th>Time</th>
</tr>

</table>

</div>

<div class="card">

<button onclick="exportExcel()">

Export Excel

</button>

</div>

<button onclick="goHome()">Exit</button>

</div>

</div>

<script>

const BIN_ID="69b2559eb7ec241ddc605001";
const API_KEY="$2a$10$rhR8M3EZH2BrZf4icYP8n./3XIT9lDt1Ba4fG8zYjyvZOEb8racrq";
const BASE="https://api.jsonbin.io/v3/b/"+BIN_ID;

let timerInterval;
let pollInterval;
let paused=false;

function findStudent(usn){
return STUDENTS.find(s=>s.id===usn);
}

async function apiGet(){

let r=await fetch(BASE+"/latest",{
headers:{'X-Master-Key':API_KEY}
});

let j=await r.json();
return j.record;

}

async function apiPut(data){

await fetch(BASE,{
method:'PUT',
headers:{
'Content-Type':'application/json',
'X-Master-Key':API_KEY
},
body:JSON.stringify(data)
});

}

function hideAll(){
login.style.display="none";
student.style.display="none";
prof.style.display="none";
}

function showStudent(){
hideAll();
student.style.display="block";
}

function showProfessor(){
hideAll();
prof.style.display="block";
}

function goHome(){
hideAll();
login.style.display="block";
}

function previewName(){

let usn=document.getElementById("usn").value.trim().toUpperCase();

let stu=findStudent(usn);

namePreview.innerText=stu?stu.name:"";

}

function randomToken(){
return Math.floor(1000+Math.random()*9000);
}

async function openSession(){

let data=await apiGet();

if(data && data.activeSession){
alert("Attendance already open");
return;
}

let token=randomToken();

if(!data){
data={sessions:[],activeSession:null};
}

data.activeSession={
token:token,
date:new Date().toISOString().slice(0,10),
period:period.value,
present:[],
times:{}
};

await apiPut(data);

tokenDisplay.innerHTML=token;

status.innerText="OPEN";

openBtn.disabled=true;

startTimer();
startPolling();

}

function startTimer(){

let remaining=300;

timerInterval=setInterval(()=>{

if(paused) return;

remaining--;

let m=Math.floor(remaining/60);
let s=remaining%60;

if(s<10)s="0"+s;

timer.innerText="Time Remaining "+m+":"+s;

if(remaining<=0)closeSession();

},1000);

}

function startPolling(){
pollInterval=setInterval(loadTable,3000);
}

function pauseSession(){
paused=true;
status.innerText="PAUSED";
alert("Attendance Paused");
}

function resumeSession(){
paused=false;
status.innerText="OPEN";
alert("Attendance Resumed");
}

async function closeSession(){

let data=await apiGet();

if(data.activeSession){

data.sessions=data.sessions||[];
data.sessions.push(data.activeSession);
data.activeSession=null;

await apiPut(data);

}

clearInterval(timerInterval);
clearInterval(pollInterval);

status.innerText="Closed";

openBtn.disabled=false;

}

async function loadTable(){

let data=await apiGet();

if(!data.activeSession) return;

table.innerHTML="<tr><th>USN</th><th>Name</th><th>Time</th></tr>";

for(let u of data.activeSession.present){

let stu=findStudent(u);
let name=stu?stu.name:"";
let time=data.activeSession.times[u];

table.innerHTML+="<tr><td>"+u+"</td><td>"+name+"</td><td>"+time+"</td></tr>";

}

count.innerHTML="Present: "+data.activeSession.present.length+" / "+STUDENTS.length;

}

async function submitAttendance(){

let usn=document.getElementById("usn").value.trim().toUpperCase();
let token=document.getElementById("token").value;

let sessionKey="attendance_"+usn;

if(localStorage.getItem(sessionKey)){
result.innerHTML="<div class='error'>Attendance already submitted from this browser</div>";
return;
}

let data=await apiGet();

if(!data.activeSession){
result.innerHTML="<div class='error'>Attendance Closed</div>";
return;
}

if(token!=data.activeSession.token){
result.innerHTML="<div class='error'>Incorrect Token</div>";
return;
}

let stu=findStudent(usn);

if(!stu){
result.innerHTML="<div class='error'>USN Not Found</div>";
return;
}

if(data.activeSession.present.includes(usn)){
result.innerHTML="<div class='error'>Already Marked</div>";
return;
}

let now=new Date();

let time=now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');

data.activeSession.present.push(usn);
data.activeSession.times[usn]=time;

await apiPut(data);

localStorage.setItem(sessionKey,"done");

result.innerHTML="<div class='success'>Attendance Marked<br>"+stu.name+"<br><small>You cannot submit again</small></div>";

submitBtn.disabled=true;
submitBtn.style.background="#777";

document.getElementById("usn").value="";
document.getElementById("token").value="";
namePreview.innerText="";

}

function exportExcel(){

apiGet().then(data=>{

let sessions=data.sessions||[];

let rows=[];

rows.push(["KLS Gogte Institute of Technology"]);
rows.push(["Department of Information Science & Engineering"]);
rows.push(["Python Programming Attendance Register"]);
rows.push(["Generated on: "+new Date().toLocaleString()]);
rows.push([]);

let header=["Sl.No","USN","Name","Total","%"];
let countRow=["","","","",""];

sessions.forEach(sess=>{
header.push(sess.date+"-"+sess.period);
});

rows.push(header);
rows.push(countRow);

STUDENTS.forEach((s,i)=>{

let presentTotal=0;

let row=[i+1,s.id,s.name,0,0];

sessions.forEach(sess=>{
if(sess.present.includes(s.id)){
row.push("P");
presentTotal++;
}else{
row.push("A");
}
});

row[3]=presentTotal;
row[4]=sessions.length?Math.round(presentTotal*100/sessions.length):0;

rows.push(row);

});

sessions.forEach((sess,i)=>{

let presentCount=0;

STUDENTS.forEach(s=>{
if(sess.present.includes(s.id)) presentCount++;
});

countRow[i+5]=presentCount;

});

let ws=XLSX.utils.aoa_to_sheet(rows);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Attendance");

XLSX.writeFile(wb,"Attendance.xlsx");

});

}

document.addEventListener("DOMContentLoaded",()=>{

let p=new URLSearchParams(location.search);

if(p.get("prof")=="1")
profcard.style.display="block";

});

</script>

</body>
</html>
